<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issue Tracker</title>

    <!-- favicon  -->
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- daisyUI and tailwind css  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- icons link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- font link  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- css file link  -->
    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body>
    <!-- login section  -->
    <section class="flex justify-center items-center py-4">
      <fieldset
        class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-5"
      >
        <div>
          <img class="flex mx-auto" src="./assets/github-logo.png" alt="">
        </div>  

        <div class="text-center space-y-2 mb-3">
          <h2 class="font-bold text-xl">GitHub Issues Tracker</h2>
          <p class="text-[#6B648B] text-sm" >Sign in to manage your issues</p>
        </div>

        <label class="label font-semibold text-sm">Username</label>
        <input type="email" class="input" placeholder="Enter Username" />

        <label class="label font-semibold text-sm">Password</label>
        <input type="password" class="input" placeholder="Password" />

        <button class="btn btn-primary mt-4">Sign In</button>

        <div class="flex items-center gap-2 mt-4">
          <div class="flex-1 bg-gray-300 h-px"></div>
          <h2 class="text-center text-sm">OR</h2>
          <div class="flex-1 bg-gray-300 h-px"></div>
        </div>

        <div class="text-center mt-2 space-y-2">
          <h2 class="text-[#64748B]">Demo Credentials:</h2>

          <div class="">
            <h2 ><span class="font-bold">Username:</span> admin</h2>
            <h2 ><span class="font-bold">Password:</span> admin123</h2>
          </div>
        </div>

      </fieldset>
    </section>

    <script src="./script/index.js"></script>
  </body>
</html>
