<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issue Tracker | Home page</title>

    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- daisyUI and tailwind css  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- icons link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- font link  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- css file link  -->
    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body>
    <!-- navbar  -->
    <div class="navbar bg-base-100 shadow-sm">
      <div class="flex-1 flex items-center">
        <img class="h-10" src="./assets/github-logo.png" alt="" />
        <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
      </div>
      <div class="flex gap-7 items-center">
        <label class="input">
          <svg
            class="h-[1em] opacity-50"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
          >
            <g
              stroke-linejoin="round"
              stroke-linecap="round"
              stroke-width="2.5"
              fill="none"
              stroke="currentColor"
            >
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.3-4.3"></path>
            </g>
          </svg>
          <input type="search" required placeholder="Search issues..." />
        </label>
        <div class="pr-3 flex justify-center">
          <button class="btn btn-primary">
            <span><i class="fa-solid fa-plus"></i></span>
            New Issue
          </button>
        </div>
      </div>
    </div>

    <!-- selection container  -->
    <section class="max-w-[1060px] mx-auto mt-20 border border-gray-200 rounded-lg shadow-sm p-4">
      <div>
        <button class="btn btn-active">All</button>
        <button class="btn btn-active">Open</button>
        <button class="btn btn-active">Closed</button>
      </div>
    </section>

    <script src="./script/home.js"></script>
  </body>
</html>
