<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issue Tracker | Home page</title>

    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- daisyUI and tailwind css  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- icons link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- font link  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- css file link  -->
    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body>
    <!-- navbar  -->
    <div class="navbar max-w-[1540px] mx-auto bg-base-100 shadow-sm">
      <div class="flex-1 flex items-center gap-4">
        <img class="h-10" src="./assets/github-logo.png" alt="" />
        <h2 class=" text-2xl font-bold">GitHub Issues Tracker</h2>
      </div>
      <div class="flex gap-7 items-center">
        <label class="input">
          <svg
            class="h-[1em] opacity-50"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
          >
            <g
              stroke-linejoin="round"
              stroke-linecap="round"
              stroke-width="2.5"
              fill="none"
              stroke="currentColor"
            >
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.3-4.3"></path>
            </g>
          </svg>
          <input id="search-input" type="search" required placeholder="Search issues..." />
        </label>
        <div class="pr-3 flex justify-center">
          <button id="search-btn" class="btn btn-primary hover:scale-115 transition transform duration-300">
            Search
          </button>
        </div>
      </div>
    </div>

    <!-- selection container  -->
    <section class="max-w-[1200px] mx-auto mt-8 border border-gray-200 rounded-md shadow-sm p-4 ">
      <div class="flex gap-4">
        <button id="select-all" class="btn btn-active sl hover:scale-115 transition transform duration-300">All</button>
        <button id="select-open" class="btn btn-active sl hover:scale-115 transition transform duration-300">Open</button>
        <button id="select-closed" class="btn btn-active sl hover:scale-115 transition transform duration-300">Closed</button>
      </div>
    </section>

    <!-- card container  -->
     <section class="max-w-[1200px] mx-auto border border-gray-200 shadow-sm m-5 rounded-md ">

        <!-- card container header  -->
        <div class="flex gap-3 shadow-sm p-4">
          <div class="bg-gray-200 p-2 rounded-full w-12 h-12 flex justify-center items-center">
            <img src="./assets/Aperture.png" alt="">
          </div>
          <div class="flex w-full justify-between">
            <div>
              <h2 class="font-bold text-xl"><span id="card-count">50</span> Issues</h2>
              <p class="text-[#64748B] text-lg">Track and manage your project issues</p>
            </div>
            <div class="flex gap-4 items-center ">
              <div class="flex items-center gap-2">
                <div class="w-4 h-4 rounded-full bg-green-600 hover:scale-145 duration-300"></div>
                <div>Open</div>
              </div>
              <div class="flex items-center gap-2">
                <div class="w-4 h-4 rounded-full bg-blue-600 hover:scale-145 duration-300"></div>
                <div>Closed</div>
              </div>
            </div>
          </div>
        </div>

        <!-- card container body  -->
         <div id="card-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 p-4 gap-4 mt-8 space-y-4 space-x-2 ">

  
          
         </div>
     </section>

    <script src="./script/home.js"></script>
  </body>
</html>
